openapi: 3.0.0
info:
  title: Jetski Backend API
  description: Real-Time AI Code Reviewer Backend API Documentation
  version: 1.0.0
servers:
  - url: http://localhost:5000
    description: Local development server
paths:
  /api/v1/health:
    get:
      summary: Health check
      description: Returns the health status of the API, Database, and Background Queue
      responses:
        '200':
          description: System is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: System is healthy
        '500':
          description: System is unhealthy
  /api/auth/register:
    post:
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                name:
                  type: string
      responses:
        '201':
          description: User registered successfully
  /api/auth/login:
    post:
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: User logged in successfully
  /api/projects:
    get:
      summary: List all user projects
      security:
        - bearerAuth: []
      responses:
        '200':
          description: A list of user's projects
    post:
      summary: Connect a new GitHub repository
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - repoOwner
                - repoName
              properties:
                repoOwner:
                  type: string
                repoName:
                  type: string
      responses:
        '201':
          description: Repository connected and project created
  /api/reviews:
    post:
      summary: Request an AI Code Review
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - projectId
                - type
                - identifier
              properties:
                projectId:
                  type: string
                type:
                  type: string
                  enum: [COMMIT, PR]
                identifier:
                  type: string
      responses:
        '201':
          description: Code review requested and queued
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
