openapi: 3.0.0
info:
  title: Jetski Backend API
  description: Real-Time AI Code Reviewer Backend API Documentation
  version: 1.0.0
servers:
  - url: http://localhost:5000
    description: Local development server
paths:
  /api/v1/health:
    get:
      summary: Health check
      description: Returns the health status of the API, Database, and Background Queue
      responses:
        '200':
          description: System is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: System is healthy
        '500':
          description: System is unhealthy
  /api/auth/register:
    post:
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                name:
                  type: string
      responses:
        '201':
          description: User registered successfully
  /api/auth/login:
    post:
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: User logged in successfully
  /api/projects:
    get:
      summary: List all user projects
      security:
        - bearerAuth: []
      responses:
        '200':
          description: A list of user's projects
    post:
      summary: Connect a new GitHub repository
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - repoOwner
                - repoName
              properties:
                repoOwner:
                  type: string
                repoName:
                  type: string
      responses:
        '201':
          description: Repository connected and project created
  /api/reviews:
    post:
      summary: Request an AI Code Review
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - projectId
                - type
                - identifier
              properties:
                projectId:
                  type: string
                type:
                  type: string
                  enum: [COMMIT, PR]
                identifier:
                  type: string
      responses:
        '201':
          description: Code review requested and queued
  /api/reviews/{id}:
    get:
      summary: Get details of a specific AI review
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: The Review ID
      responses:
        '200':
          description: Successfully fetched the review
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/Review'
  /api/reviews/repo/{repoId}:
    get:
      summary: Get all reviews for a repository
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: repoId
          required: true
          schema:
            type: string
          description: The Repository ID
      responses:
        '200':
          description: Successfully fetched repository reviews
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Review'
components:
  schemas:
    Review:
      type: object
      properties:
        id:
          type: string
        repoId:
          type: string
        status:
          type: string
          enum: [PENDING, IN_PROGRESS, COMPLETED, FAILED]
        targetType:
          type: string
          enum: [COMMIT, PR]
        targetId:
          type: string
        summary:
          type: string
        overallScore:
          type: integer
        grade:
          type: string
        createdAt:
          type: string
          format: date-time
        comments:
          type: array
          items:
            $ref: '#/components/schemas/ReviewComment'
    ReviewComment:
      type: object
      properties:
        id:
          type: string
        filePath:
          type: string
        lineNumber:
          type: integer
        category:
          type: string
        title:
          type: string
        comment:
          type: string
        suggestion:
          type: string
        codeSnippet:
          type: string
        severity:
          type: string
        confidence:
          type: number
          format: float
        createdAt:
          type: string
          format: date-time
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
