# ─────────────────────────────────────────────────────────────────────────────
# Docker Compose — Local Development Environment
# ─────────────────────────────────────────────────────────────────────────────
# This file orchestrates all services needed to run the backend locally.
# Usage:
#   docker compose up              → Start all services
#   docker compose up -d           → Start in detached mode
#   docker compose down            → Stop all services
#   docker compose down -v         → Stop and remove volumes (reset data)
#   docker compose logs -f backend → Follow backend logs
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Backend Application ──────────────────────────────────────────────────
  # Builds from the local Dockerfile and runs the Express.js application.
  # In development mode, source code is mounted as a volume for hot-reloading.
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: jetski_backend
    ports:
      - "${PORT:-5000}:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - DATABASE_URL=postgresql://jetski_user:jetski_pass@postgres:5432/jetski_dev?schema=public
      - JWT_SECRET=dev_jwt_secret_key_change_in_production_1234567890
      - JWT_EXPIRES_IN=7d
      - CLIENT_URL=http://localhost:3000
      - CORS_ORIGIN=http://localhost:3000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GITHUB_ACCESS_TOKEN=${GITHUB_ACCESS_TOKEN}
      - LOG_LEVEL=debug
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Mount source code for hot-reloading during development.
      # Changes to files in ./src are immediately reflected inside the container.
      - ./src:/usr/src/app/src
    # Override the production CMD to use nodemon for hot-reloading.
    command: npx nodemon src/server.js
    restart: unless-stopped
    networks:
      - jetski_network

  # ── PostgreSQL Database ──────────────────────────────────────────────────
  # The primary data store for all application data (users, projects, reviews).
  # pg-boss uses the same PostgreSQL instance — it creates its own schema
  # automatically, so no separate service is needed.
  postgres:
    image: postgres:16-alpine
    container_name: jetski_postgres
    ports:
      # Exposed to host so you can connect with pgAdmin, DBeaver, or psql.
      - "5432:5432"
    environment:
      POSTGRES_USER: jetski_user
      POSTGRES_PASSWORD: jetski_pass
      POSTGRES_DB: jetski_dev
    volumes:
      # Named volume for data persistence across container restarts.
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # The backend service waits for this healthcheck to pass before starting.
      test: ["CMD-SHELL", "pg_isready -U jetski_user -d jetski_dev"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - jetski_network

  # ── Redis (Placeholder for Future Scalability) ───────────────────────────
  # Currently unused by the application. This service is included as a
  # placeholder for future features such as:
  #   - Session caching
  #   - Rate limiting with distributed state
  #   - Socket.IO horizontal scaling with the Redis adapter
  #   - Response caching for GitHub/AI API calls
  #
  # To enable: set REDIS_URL=redis://redis:6379 in the backend environment
  # and install ioredis in the application.
  redis:
    image: redis:7-alpine
    container_name: jetski_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - jetski_network

# ── Named Volumes ────────────────────────────────────────────────────────────
# Docker-managed volumes that persist data across container restarts.
# Use `docker compose down -v` to destroy them and start fresh.
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ── Network ──────────────────────────────────────────────────────────────────
# All services share a single bridge network so they can resolve each other
# by container name (e.g., the backend connects to "postgres" not "localhost").
networks:
  jetski_network:
    driver: bridge
