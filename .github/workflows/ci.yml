name: Backend CI/CD

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'backend/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - 'backend/**'

jobs:
  test-and-lint:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Check code formatting & linting
        run: npm run lint

      - name: Run Unit & Integration Tests
        run: npm run test
        env:
          DATABASE_URL: 'postgresql://mockuser:mockpass@localhost:5432/mockdb'
          JWT_SECRET: 'mock_jwt_secret_must_be_10_chars'
          GEMINI_API_KEY: 'mock_gemini_api_key'
          NODE_ENV: 'test'

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test-and-lint
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (Dry Run)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false # Set to true when registry is configured (e.g. GitHub Packages or Docker Hub)
          tags: ai-code-reviewer-backend:${{ github.sha }}, ai-code-reviewer-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production (Render)
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Trigger Render Deployment
        run: |
          # Replace the URL below with your actual Render Deploy Hook URL when Phase 9 is completed
          echo "Triggering deployment to Render..."
          # curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
          echo "Deployment triggered successfully!"
